name: Validate Skill

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - name: Check executable scripts
        run: |
          test -x scripts/init_video.sh
          test -x scripts/mix_finalize.py
          test -x scripts/review_gen/generate.py
          test -x tests/smoke_test.sh
      - name: Static checks
        run: |
          bash -n scripts/init_video.sh
          bash -n tests/smoke_test.sh
          python -m compileall -q scripts tests
          python tests/validate_skill.py
      - name: Synthetic media smoke test
        run: bash tests/smoke_test.sh
